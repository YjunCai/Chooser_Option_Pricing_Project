# =============================================================================
# Chooser Option Pricing — Automated Preprocessing Pipeline (Week 2)
# =============================================================================
# Requires: week1/data/ raw CSV files committed to repository
# Trigger:
#   - Scheduled: every weekday 06:00 UTC
#   - Manual: GitHub UI → Actions → Run workflow
#   - Push: changes to week2/ or workflow file
# =============================================================================

name: Data Preprocessing Pipeline

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/data_pipeline.yml"
      - "week2/**"
      - "week1/data/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r week2/requirements.txt
          pip install yfinance

      - name: Run preprocessing pipeline
        working-directory: week2
        run: python preprocessing_pipeline.py --format csv

      - name: Commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add week2/data/ week2/output/
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'chore(data): automated pipeline update'
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push
          fi
